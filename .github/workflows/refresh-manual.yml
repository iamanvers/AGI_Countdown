name: Refresh (on-demand)

# Triggered manually from the GitHub UI or from the website's "Trigger refresh"
# button via the /api/refresh route (workflow_dispatch).
on:
  workflow_dispatch:

concurrency:
  group: agi-countdown-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Refresh all snapshots
        run: pnpm --filter @agi-countdown/pipeline refresh -- --cadence all
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}

      - name: Commit snapshots
        run: |
          git config user.name "agi-countdown-bot"
          git config user.email "bot@users.noreply.github.com"
          git add apps/web/public/data
          git commit -m "data: on-demand refresh" || echo "no changes"
          git push
