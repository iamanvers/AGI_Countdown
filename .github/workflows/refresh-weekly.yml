name: Refresh weekly data

on:
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch:

jobs:
  refresh-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Refresh weekly snapshots
        run: pnpm --filter @agi-countdown/pipeline refresh -- --cadence weekly

      - name: Commit snapshots
        run: |
          git config user.name "agi-countdown-bot"
          git config user.email "bot@users.noreply.github.com"
          git add apps/web/public/data
          git commit -m "data: refresh weekly snapshots" || echo "no changes"
          git push origin HEAD:master
