name: Refresh daily data

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

jobs:
  refresh-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Refresh daily snapshots
        run: pnpm --filter @agi-countdown/pipeline refresh -- --cadence daily

      - name: Commit snapshots
        run: |
          git config user.name "agi-countdown-bot"
          git config user.email "bot@users.noreply.github.com"
          git add apps/web/public/data apps/web/public/badge.svg apps/web/public/badge.json
          git commit -m "data: refresh daily snapshots" || echo "no changes"
          git push origin HEAD:master
